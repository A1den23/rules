
proxy-providers:
  FlowerCloud:
    url: "你的订阅链接"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: Direct

# 节点信息
proxies:
  - {name: Direct, type: direct}

# 全局配置 
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false
profile:
  store-selected: true
  store-fake-ip: true

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed

  # ✅ 优化：TUN MTU 设置（提升吞吐量）
  # 标准值：1500，巨型帧：9000
  # PPPoE 连接推荐值：1400-1492
  mtu: 1400

  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist

  fake-ip-store: true
  fake-ip-store-path: ./fakeip.db

  prefer-h3: false  # 禁用 HTTP/3（兼容性更好）
  use-hosts: true  # 使用系统 hosts 文件
  cache-algorithm: arc  # 使用 ARC 缓存算法（性能最优）

  fake-ip-filter:
    # 规则集过滤（这些域名返回真实 IP）
    - "rule-set:private_domain"
    - "rule-set:cn_domain"
    - '+.lan'
    - '+.local'
    - '+.localdomain'
    # 系统和网络测试域名
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
    - '+.router'  # 路由器管理页面
    - '+.home'  # 家庭网络

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 使用 DoH 避免代理节点域名被污染
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query

  # 根据域名规则集指定不同的 DNS 服务器
  nameserver-policy:
    # 国内域名使用国内 DNS（直连，速度快）
    'geosite:cn':
      - 223.5.5.5
      - 119.29.29.29
    # 国外域名使用 DoH（通过代理查询，防污染）
    'geosite:geolocation-!cn':
      - https://223.5.5.5/dns-query
      - https://119.29.29.29/dns-query
      - https://1.1.1.1/dns-query 
    # CDN 域名（智能选择最优节点）
    'geosite:cloudflare':
      - https://1.1.1.1/dns-query
    'geosite:google':
      - https://8.8.8.8/dns-query
    # LAN 和本地域名
    '+.lan':
      - 223.5.5.5
      - 119.29.29.29
    '+.local':
      - 223.5.5.5
      - 119.29.29.29
    '+.router':
      - 223.5.5.5
    # 路由器和网络设备
    'router.lan':
      - 223.5.5.5

  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true

  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://223.5.5.5/dns-query  
 
pr: &select {type: select, proxies: [🚀 Proxies, 🎯 Direct], include-all: true}
proxy-groups:
  - {name: 🚀 Proxies, type: select, proxies: [🇭🇰 HongKong, 🇸🇬 Singapore, 🇯🇵 Japan, 🇨🇳 Taiwan, 🇺🇲 UnitedStates], include-all: true}
  - {name: Binance, type: select, proxies: [🚀 Proxies, 🇭🇰 HongKong, 🇸🇬 Singapore, 🇯🇵 Japan, 🇨🇳 Taiwan, 🇺🇲 UnitedStates], include-all: true, icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Binance.png"}
  - {name: Telegram, type: select, proxies: [🚀 Proxies, 🇭🇰 HongKong, 🇸🇬 Singapore, 🇯🇵 Japan, 🇨🇳 Taiwan, 🇺🇲 UnitedStates], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Telegram.png"}
  - {name: YouTube, type: select, proxies: [🚀 Proxies, 🇭🇰 HongKong, 🇸🇬 Singapore, 🇯🇵 Japan, 🇨🇳 Taiwan, 🇺🇲 UnitedStates], include-all: true, icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/YouTube.png"}
  - {name: AI, type: select, proxies: [🚀 Proxies, 🇭🇰 HongKong, 🇸🇬 Singapore, 🇯🇵 Japan, 🇨🇳 Taiwan, 🇺🇲 UnitedStates], include-all: true, icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/AI.png"}
  - {name: Apple, type: select, proxies: [🎯 Direct, 🚀 Proxies], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Apple.png"}
  - {name: Steam, type: select, proxies: [🚀 Proxies, 🎯 Direct], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Steam.png"}
  - {name: Spotify, type: select, proxies: [🚀 Proxies, 🇭🇰 HongKong, 🇸🇬 Singapore, 🇯🇵 Japan, 🇨🇳 Taiwan, 🇺🇲 UnitedStates], include-all: true, icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Spotify.png"}
  - {name: Bilibili, type: select, proxies: [🎯 Direct, 🇨🇳 Taiwan], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Bilibili.png"}
  - {name: 🎞️ PikPak, << : *select}
  - {name: CEX, type: select, proxies: [🚀 Proxies, 🇭🇰 HongKong, 🇸🇬 Singapore, 🇯🇵 Japan, 🇨🇳 Taiwan, 🇺🇲 UnitedStates], icon: "https://raw.githubusercontent.com/Vbaethon/HOMOMIX/refs/heads/main/Icon/Color/Large/Bitcoin.png"}
  - {name: 🎯 Direct, type: select, proxies: [Direct, 🚀 Proxies]}
  - {name: 🐟 Others, type: select, proxies: [🚀 Proxies, 🎯 Direct]}
  - {name: 🇭🇰 HongKong, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(港|HK|香港|(?i)Hong))^((?!(台|日|韩|新|美)).)*$"}
  - {name: 🇸🇬 Singapore, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(新加坡|SG|坡|狮城|Singapore))^((?!(港|台|韩|日|美)).)*$" }
  - {name: 🇯🇵 Japan, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(日|日本|JP|(?i)Japan))^((?!(港|台|韩|新|美|尼)).)*$" }
  - {name: 🇨🇳 Taiwan, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(台|台湾|TW|(?i)Taiwan))^((?!(港|日|韩|新|美)).)*$"}
  - {name: 🇺🇲 UnitedStates, type: url-test, include-all: true, use: [], tolerance: 20, interval: 300, filter: "(?=.*(美|美国|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"}

